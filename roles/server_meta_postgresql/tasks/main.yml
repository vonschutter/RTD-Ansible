---
#::                                   ANSIBLE ROLE
#::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::
#::::::::::::::::::::::::::::// RTD PostgreSQL server metapackage wrapper //:::::::::// Ansible //:::::::::::::::::::::::
#:: Purpose:
#::   Install the Ubuntu/Debian PostgreSQL server package through the shared
#::   server_metapackage_base role.
#::
#:: How this file works:
#::   - Imports server_metapackage_base.
#::   - Sets server_task to postgresql-server.
#::   - server_metapackage_base resolves postgresql-server through
#::     server_task_package_map and performs the apt install.
#::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::

# Wrapper role: request the PostgreSQL server capability from the shared base role.
- name: Install postgresql-server meta-package
  ansible.builtin.import_role:
    name: server_metapackage_base
  vars:
    server_task: postgresql-server
