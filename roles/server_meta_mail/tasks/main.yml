---
#::                                   ANSIBLE ROLE
#::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::
#::::::::::::::::::::::::::::// RTD mail server metapackage wrapper //::::::::::::::::// Ansible //::::::::::::::::::::::
#:: Purpose:
#::   Install the Ubuntu/Debian mail server task through the shared
#::   server_metapackage_base role.
#::
#:: How this file works:
#::   - Imports server_metapackage_base.
#::   - Sets server_task to mail-server.
#::   - server_metapackage_base resolves mail-server through
#::     server_task_package_map and performs the apt/tasksel install.
#::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::

# Wrapper role: request the mail server capability from the shared base role.
- name: Install mail-server task
  ansible.builtin.import_role:
    name: server_metapackage_base
  vars:
    server_task: mail-server
