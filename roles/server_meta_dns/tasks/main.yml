---
#::                                   ANSIBLE ROLE
#::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::
#::::::::::::::::::::::::::::// RTD DNS server metapackage wrapper //:::::::::::::::::// Ansible //::::::::::::::::::::::
#:: Purpose:
#::   Install the Ubuntu/Debian DNS server task through the shared
#::   server_metapackage_base role.
#::
#:: How this file works:
#::   - Imports server_metapackage_base.
#::   - Sets server_task to dns-server.
#::   - server_metapackage_base resolves dns-server through
#::     server_task_package_map and performs the apt/tasksel install.
#::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::

# Wrapper role: request the DNS server capability from the shared base role.
- name: Install dns-server task
  ansible.builtin.import_role:
    name: server_metapackage_base
  vars:
    server_task: dns-server
