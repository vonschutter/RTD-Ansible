---
#::                                   ANSIBLE ROLE
#::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::
#::::::::::::::::::::::::::::// RTD LAMP server metapackage wrapper //::::::::::::::::// Ansible //::::::::::::::::::::::
#:: Purpose:
#::   Install the Ubuntu/Debian LAMP server task through the shared
#::   server_metapackage_base role.
#::
#:: How this file works:
#::   - Imports server_metapackage_base.
#::   - Sets server_task to lamp-server.
#::   - server_metapackage_base resolves lamp-server through
#::     server_task_package_map and performs the apt/tasksel install.
#::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::

# Wrapper role: request the LAMP server capability from the shared base role.
- name: Install lamp-server task
  ansible.builtin.import_role:
    name: server_metapackage_base
  vars:
    server_task: lamp-server
